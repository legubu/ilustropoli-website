[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect for Decap CMS OAuth (if using Netlify Identity)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
