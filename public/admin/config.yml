backend:
  name: github
  repo: RolandoGR/ilustropoli-website
  branch: master

# Local backend for development — run `npx decap-server` to use
# local_backend: true

media_folder: src/assets/artworks
public_folder: ../../assets/artworks

site_url: https://ilustropoli.netlify.app
display_url: https://ilustropoli.netlify.app

collections:

  # ── OBRAS ────────────────────────────────────────────────────────
  - name: artworks
    label: Obras
    label_singular: Obra
    folder: src/content/artworks
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Título, name: title, widget: string }

      - label: Imágenes
        name: images
        widget: list
        min: 1
        hint: "La primera imagen es la principal. Podés agregar más para la galería de detalle."
        field: { label: Imagen, name: image, widget: image }

      - { label: Soporte / Dimensiones, name: surface, widget: string, required: false, hint: "Ej: Acuarela sobre papel 300g, 35×50 cm" }
      - { label: Paleta, name: palette, widget: string, required: false, hint: "Ej: Tierras, azules y dorados" }

      - { label: Destacada en inicio, name: featured, widget: boolean, default: false, hint: "Aparece en la sección de obras destacadas en la página principal." }

      - label: "——— Venta ———"
        name: sale_divider
        widget: hidden
        default: ""

      - label: Categoría
        name: category
        widget: select
        options:
          - { label: Acuarela, value: acuarela }
          - { label: Acrílico, value: acrilico }
          - { label: Óleo, value: oleo }
          - { label: Sketch, value: sketch }
        required: false
        hint: "Técnica principal de la obra."

      - { label: Disponible para venta, name: for_sale, widget: boolean, default: false, hint: "Activar para que aparezca en la Tienda con precio y botón de compra." }
      - { label: Precio (MXN), name: price, widget: number, value_type: int, required: false, hint: "Solo necesario si la obra está en venta." }
      - { label: Stock, name: stock, widget: number, value_type: int, default: 1, required: false, hint: "Cantidad de piezas disponibles. Dejar en 1 para obra única." }
      - { label: Link de pago (MercadoPago), name: payment_link, widget: string, required: false, hint: "URL de MercadoPago. Ej: https://mpago.la/XXXXXX" }

      - label: Etiquetas
        name: tags
        widget: relation
        collection: tags
        value_field: "{{slug}}"
        display_fields: ["title"]
        search_fields: ["title"]
        multiple: true
        required: false
        hint: "Busca y selecciona etiquetas. Para crear una nueva, ve a la sección Etiquetas."

      - { label: Descripción, name: body, widget: markdown, required: false, hint: "Historia, técnica, inspiración de la obra." }

  # ── TALLERES ─────────────────────────────────────────────────────
  - name: workshops
    label: Talleres
    label_singular: Taller
    folder: src/content/workshops
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{date}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Imagen, name: image, widget: image, required: false, hint: "Imagen de portada del taller." }
      - { label: Fecha, name: date, widget: string, hint: "Formato: YYYY-MM-DD. Ej: 2026-05-10" }
      - { label: Duración, name: duration, widget: string, hint: "Ej: 4 horas" }
      - { label: Precio (MXN), name: price, widget: number, value_type: int }
      - { label: Cupos disponibles, name: capacity, widget: number, value_type: int }
      - { label: Destacado en inicio, name: featured, widget: boolean, default: false }
      - { label: Link de pago (MercadoPago), name: payment_link, widget: string, required: false, hint: "URL de MercadoPago para reservar lugar." }
      - { label: Descripción, name: body, widget: markdown, required: false, hint: "Qué incluye, nivel, lugar, etc." }

  # ── ETIQUETAS ────────────────────────────────────────────────────
  - name: tags
    label: Etiquetas
    label_singular: Etiqueta
    folder: src/content/tags
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Nombre, name: title, widget: string, hint: "Ej: Trabajo comisionado, Retrato, Serie limitada" }
